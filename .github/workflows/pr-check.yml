name: PR Build & Security Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  DOCKER_IMAGE: devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image-ref.outputs.ref }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image reference
        id: image-ref
        run: echo "ref=${{ env.DOCKER_IMAGE }}:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

  security-scan:
    needs: build
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      security-events: write
    with:
      image-ref: ${{ needs.build.outputs.image-ref }}
      severity: 'CRITICAL,HIGH,MEDIUM'
      fail-on-severity: 'CRITICAL'

  report:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Create PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildStatus = '${{ needs.build.result }}' === 'success' ? '✅ Build successful' : '❌ Build failed';
            const scanPassed = '${{ needs.security-scan.outputs.scan-passed }}' === 'true';
            const critical = ${{ needs.security-scan.outputs.critical-count }};
            const high = ${{ needs.security-scan.outputs.high-count }};
            const medium = ${{ needs.security-scan.outputs.medium-count }};
            
            let securityStatus = '✅ No security issues';
            let securityEmoji = '🟢';
            
            if (!scanPassed) {
              securityStatus = `🔴 Critical issues found`;
              securityEmoji = '🔴';
            } else if (high > 0) {
              securityStatus = `🟠 High severity issues found`;
              securityEmoji = '🟠';
            } else if (medium > 0) {
              securityStatus = `🟡 Medium severity issues found`;
              securityEmoji = '🟡';
            }
            
            const scanSummary = `${{ needs.security-scan.outputs.scan-summary }}`;
            
            const comment = `## 🔍 PR Check Results
            **Commit:** \`${{ github.event.pull_request.head.sha }}\`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 🏗️ Build Status
            ${buildStatus}
            
            ### ${securityEmoji} Security Scan
            ${securityStatus}
            
            ${scanSummary}
            
            ---
            *Automated check by GitHub Actions*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
      
      - name: Fail if critical issues found
        if: needs.security-scan.outputs.scan-passed != 'true'
        run: |
          echo "❌ Critical vulnerabilities or secrets found! Please review the security scan results."
          exit 1
