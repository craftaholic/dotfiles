name: PR Build & Security Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  DOCKER_IMAGE: devcontainer

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    outputs:
      scan-passed: ${{ steps.check-threshold.outputs.passed }}
      critical-count: ${{ steps.trivy-parse.outputs.critical }}
      high-count: ${{ steps.trivy-parse.outputs.high }}
      medium-count: ${{ steps.trivy-parse.outputs.medium }}
      secrets-found: ${{ steps.trufflehog.outcome == 'failure' }}
      scan-summary: ${{ steps.generate-summary.outputs.markdown }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      
      - name: TruffleHog OSS
        id: trufflehog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
      
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.pull_request.number }}
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          trivyignores: '.trivyignore'
          scanners: 'vuln'
      
      - name: Parse Trivy results
        id: trivy-parse
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
      
      - name: Check severity threshold
        id: check-threshold
        run: |
          CRITICAL=${{ steps.trivy-parse.outputs.critical }}
          HIGH=${{ steps.trivy-parse.outputs.high }}
          SECRETS_FOUND="${{ steps.trufflehog.outcome }}"
          
          PASSED=true
          
          if [ "$CRITICAL" -gt 0 ]; then
            PASSED=false
          fi
          
          if [ "$SECRETS_FOUND" = "failure" ]; then
            PASSED=false
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
      
      - name: Generate summary
        id: generate-summary
        run: |
          CRITICAL=${{ steps.trivy-parse.outputs.critical }}
          HIGH=${{ steps.trivy-parse.outputs.high }}
          MEDIUM=${{ steps.trivy-parse.outputs.medium }}
          SECRETS_FOUND="${{ steps.trufflehog.outcome }}"
          PASSED=${{ steps.check-threshold.outputs.passed }}
          
          cat << 'EOF' > trivy-summary.md
          ## 🔒 Security Scan Results
          
          EOF
          
          if [ "$PASSED" = "true" ]; then
            echo "**Status**: ✅ PASSED | **Scanned**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> trivy-summary.md
          else
            echo "**Status**: ⚠️ ISSUES FOUND | **Scanned**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> trivy-summary.md
          fi
          
          echo "" >> trivy-summary.md
          
          if [ "$SECRETS_FOUND" = "failure" ]; then
            echo "### 🔑 Secret Scan (TruffleHog)" >> trivy-summary.md
            echo "- 🔴 **Secrets detected in repository**" >> trivy-summary.md
            echo "" >> trivy-summary.md
          else
            echo "### 🔑 Secret Scan (TruffleHog)" >> trivy-summary.md
            echo "- ✅ No secrets detected" >> trivy-summary.md
            echo "" >> trivy-summary.md
          fi
          
          echo "### Vulnerability Summary (Trivy)" >> trivy-summary.md
          echo "- 🔴 Critical: $CRITICAL" >> trivy-summary.md
          echo "- 🟠 High: $HIGH" >> trivy-summary.md
          echo "- 🟡 Medium: $MEDIUM" >> trivy-summary.md
          echo "" >> trivy-summary.md
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "### 🐛 Top Vulnerabilities" >> trivy-summary.md
            echo "" >> trivy-summary.md
            
            CRITICAL_VULNS=$(jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") | "\(.Severity)|\(.VulnerabilityID)|\(.PkgName)|\(.InstalledVersion)|\(.Title)"' trivy-results.json | sort | uniq -c | sort -rn | awk '{count=$1; $1=""; gsub(/^ /, ""); split($0, a, "|"); printf "- **[%s]** %s: %s %s (%d instance%s) - %s\n", a[1], a[2], a[3], a[4], count, (count>1?"s":""), a[5]}')
            
            if [ -n "$CRITICAL_VULNS" ]; then
              echo "$CRITICAL_VULNS" >> trivy-summary.md
              CRITICAL_COUNT=$(echo "$CRITICAL_VULNS" | wc -l)
            else
              CRITICAL_COUNT=0
            fi
            
            HIGH_LIMIT=$((20 - CRITICAL_COUNT))
            if [ $HIGH_LIMIT -gt 0 ]; then
              HIGH_VULNS=$(jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH") | "\(.Severity)|\(.VulnerabilityID)|\(.PkgName)|\(.InstalledVersion)|\(.Title)"' trivy-results.json | sort | uniq -c | sort -rn | awk '{count=$1; $1=""; gsub(/^ /, ""); split($0, a, "|"); printf "- **[%s]** %s: %s %s (%d instance%s) - %s\n", a[1], a[2], a[3], a[4], count, (count>1?"s":""), a[5]}' | head -$HIGH_LIMIT)
              
              if [ -n "$HIGH_VULNS" ]; then
                echo "$HIGH_VULNS" >> trivy-summary.md
              fi
            fi
          fi
          
          if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ] && [ "$MEDIUM" -eq 0 ] && [ "$SECRETS_FOUND" != "failure" ]; then
            echo "✅ No security issues found" >> trivy-summary.md
          fi
          
          SUMMARY=$(cat trivy-summary.md)
          echo "markdown<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Upload Trivy results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-results-${{ github.run_id }}
          path: trivy-results.json
          retention-days: 30

  report:
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          SCAN_SUMMARY: ${{ needs.build-and-scan.outputs.scan-summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildStatus = '${{ needs.build-and-scan.result }}' === 'success' ? '✅ Build successful' : '❌ Build failed';
            const scanPassed = '${{ needs.build-and-scan.outputs.scan-passed }}' === 'true';
            const critical = ${{ needs.build-and-scan.outputs.critical-count }};
            const high = ${{ needs.build-and-scan.outputs.high-count }};
            const medium = ${{ needs.build-and-scan.outputs.medium-count }};
            
            let securityStatus = '✅ No security issues';
            let securityEmoji = '🟢';
            
            if (!scanPassed) {
              securityStatus = '🔴 Critical issues found';
              securityEmoji = '🔴';
            } else if (high > 0) {
              securityStatus = '🟠 High severity issues found';
              securityEmoji = '🟠';
            } else if (medium > 0) {
              securityStatus = '🟡 Medium severity issues found';
              securityEmoji = '🟡';
            }
            
            const scanSummary = process.env.SCAN_SUMMARY;
            
            const comment = `## 🔍 PR Check Results
            **Commit:** \`${{ github.event.pull_request.head.sha }}\`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 🏗️ Build Status
            ${buildStatus}
            
            ### ${securityEmoji} Security Scan
            ${securityStatus}
            
            ${scanSummary}
            
            ---
            *Automated check by GitHub Actions*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
      
      - name: Fail if critical issues found
        if: needs.build-and-scan.outputs.scan-passed != 'true'
        run: |
          echo "❌ Critical vulnerabilities or secrets found! Please review the security scan results."
          exit 1
