name: Security Scan

on:
  workflow_call:
    inputs:
      image-ref:
        description: 'Docker image reference to scan (e.g., image:tag)'
        required: true
        type: string
      severity:
        description: 'Comma-separated severity levels to scan for'
        required: false
        type: string
        default: 'CRITICAL,HIGH,MEDIUM'
      fail-on-severity:
        description: 'Comma-separated severity levels that should fail the workflow'
        required: false
        type: string
        default: 'CRITICAL'
    outputs:
      scan-summary:
        description: 'Markdown summary of security scan results'
        value: ${{ jobs.scan.outputs.summary }}
      scan-passed:
        description: 'Boolean indicating if scan passed severity threshold'
        value: ${{ jobs.scan.outputs.passed }}
      critical-count:
        description: 'Number of critical vulnerabilities found'
        value: ${{ jobs.scan.outputs.critical }}
      high-count:
        description: 'Number of high vulnerabilities found'
        value: ${{ jobs.scan.outputs.high }}
      medium-count:
        description: 'Number of medium vulnerabilities found'
        value: ${{ jobs.scan.outputs.medium }}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.generate-summary.outputs.markdown }}
      passed: ${{ steps.check-threshold.outputs.passed }}
      critical: ${{ steps.trivy-parse.outputs.critical }}
      high: ${{ steps.trivy-parse.outputs.high }}
      medium: ${{ steps.trivy-parse.outputs.medium }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .trivyignore
          sparse-checkout-cone-mode: false
      
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.image-ref }}
          format: 'json'
          output: 'trivy-results.json'
          severity: ${{ inputs.severity }}
          exit-code: '0'
          trivyignores: '.trivyignore'
          scanners: 'vuln'
      
      - name: Parse Trivy results
        id: trivy-parse
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
      
      - name: Check severity threshold
        id: check-threshold
        run: |
          CRITICAL=${{ steps.trivy-parse.outputs.critical }}
          HIGH=${{ steps.trivy-parse.outputs.high }}
          MEDIUM=${{ steps.trivy-parse.outputs.medium }}
          
          FAIL_THRESHOLD="${{ inputs.fail-on-severity }}"
          PASSED=true
          
          if [[ "$FAIL_THRESHOLD" == *"CRITICAL"* ]] && [ "$CRITICAL" -gt 0 ]; then
            PASSED=false
          fi
          
          if [[ "$FAIL_THRESHOLD" == *"HIGH"* ]] && [ "$HIGH" -gt 0 ]; then
            PASSED=false
          fi
          
          if [[ "$FAIL_THRESHOLD" == *"MEDIUM"* ]] && [ "$MEDIUM" -gt 0 ]; then
            PASSED=false
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
      
      - name: Generate summary
        id: generate-summary
        run: |
          CRITICAL=${{ steps.trivy-parse.outputs.critical }}
          HIGH=${{ steps.trivy-parse.outputs.high }}
          MEDIUM=${{ steps.trivy-parse.outputs.medium }}
          PASSED=${{ steps.check-threshold.outputs.passed }}
          
          cat << 'EOF' > trivy-summary.md
          ## 🔒 Security Scan Results
          
          EOF
          
          if [ "$PASSED" = "true" ]; then
            echo "**Status**: ✅ PASSED | **Scanned**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> trivy-summary.md
          else
            echo "**Status**: ⚠️ ISSUES FOUND | **Scanned**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> trivy-summary.md
          fi
          
          echo "" >> trivy-summary.md
          echo "### Vulnerability Summary" >> trivy-summary.md
          echo "- 🔴 Critical: $CRITICAL" >> trivy-summary.md
          echo "- 🟠 High: $HIGH" >> trivy-summary.md
          echo "- 🟡 Medium: $MEDIUM" >> trivy-summary.md
          echo "" >> trivy-summary.md
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "### 🐛 Top Vulnerabilities" >> trivy-summary.md
            echo "" >> trivy-summary.md
            
            CRITICAL_VULNS=$(jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") | "\(.Severity)|\(.VulnerabilityID)|\(.PkgName)|\(.InstalledVersion)|\(.Title)"' trivy-results.json | sort | uniq -c | sort -rn | awk '{count=$1; $1=""; gsub(/^ /, ""); split($0, a, "|"); printf "- **[%s]** %s: %s %s (%d instance%s) - %s\n", a[1], a[2], a[3], a[4], count, (count>1?"s":""), a[5]}')
            
            if [ -n "$CRITICAL_VULNS" ]; then
              echo "$CRITICAL_VULNS" >> trivy-summary.md
              CRITICAL_COUNT=$(echo "$CRITICAL_VULNS" | wc -l)
            else
              CRITICAL_COUNT=0
            fi
            
            HIGH_LIMIT=$((20 - CRITICAL_COUNT))
            if [ $HIGH_LIMIT -gt 0 ]; then
              HIGH_VULNS=$(jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH") | "\(.Severity)|\(.VulnerabilityID)|\(.PkgName)|\(.InstalledVersion)|\(.Title)"' trivy-results.json | sort | uniq -c | sort -rn | awk '{count=$1; $1=""; gsub(/^ /, ""); split($0, a, "|"); printf "- **[%s]** %s: %s %s (%d instance%s) - %s\n", a[1], a[2], a[3], a[4], count, (count>1?"s":""), a[5]}' | head -$HIGH_LIMIT)
              
              if [ -n "$HIGH_VULNS" ]; then
                echo "$HIGH_VULNS" >> trivy-summary.md
              fi
            fi
          fi
          
          if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ] && [ "$MEDIUM" -eq 0 ]; then
            echo "✅ No security issues found" >> trivy-summary.md
          fi
          
          SUMMARY=$(cat trivy-summary.md)
          echo "markdown<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Upload Trivy results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: trivy-results-${{ github.run_id }}
          path: trivy-results.json
          retention-days: 30
